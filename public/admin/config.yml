backend:
  name: github
  repo: micqej/etraktor-web
  branch: main

media_folder: public/images
public_folder: /images

locale: sk

collections:

  - name: "domov"
    label: "🏠 Domov"
    files:
      - name: "domov"
        label: "Obsah úvodnej stránky"
        file: "content/domov.json"
        fields:
          - { label: "Hlavný nadpis", name: "hero_title", widget: "string" }
          - { label: "Podnadpis", name: "hero_subtitle", widget: "string" }
          - { label: "Popis", name: "hero_description", widget: "text" }
          - { label: "Hlavný obrázok (URL)", name: "hero_image", widget: "image" }
          - label: "Vlastné produkty (ET 2000, ET 3000...)"
            name: vlastne_produkty
            widget: list
            fields:
              - { label: "Názov produktu", name: nazov, widget: string }
              - { label: "Krátky popis", name: popis, widget: text }
              - { label: "Obrázok", name: image, widget: image }
          - label: "Sekcie služieb"
            name: sluzby
            widget: list
            fields:
              - { label: "Názov", name: nazov, widget: string }
              - { label: "Popis", name: popis, widget: text }
              - { label: "Obrázok", name: image, widget: image }
              - { label: "Odkaz (napr. palety.html)", name: link, widget: string }
          - { label: "O spoločnosti – text", name: "o_spolocnosti", widget: "text" }

  - name: "palety"
    label: "📦 Transportné palety"
    folder: "content/palety"
    create: true
    slug: "{{slug}}"
    label_singular: "Projekt / Foto"
    fields:
      - { label: "Názov projektu", name: "title", widget: "string" }
      - { label: "Popis", name: "popis", widget: "text" }
      - { label: "Obrázok", name: "image", widget: "image" }
      - { label: "Dátum", name: "datum", widget: "date", required: false }

  - name: "zariadenia"
    label: "⚙️ Jednoúčelové zariadenia"
    folder: "content/zariadenia"
    create: true
    slug: "{{slug}}"
    label_singular: "Projekt / Foto"
    fields:
      - { label: "Názov projektu", name: "title", widget: "string" }
      - { label: "Popis", name: "popis", widget: "text" }
      - { label: "Obrázok", name: "image", widget: "image" }

  - name: "vyroba"
    label: "🏭 Výroba"
    folder: "content/vyroba"
    create: true
    slug: "{{slug}}"
    label_singular: "Foto / Projekt"
    fields:
      - { label: "Názov", name: "title", widget: "string" }
      - { label: "Popis", name: "popis", widget: "text" }
      - { label: "Obrázok", name: "image", widget: "image" }

  - name: "etraktor"
    label: "🚜 eTRAKTOR – Produkty"
    files:
      - name: "produkty"
        label: "Obsah stránky eTRAKTOR"
        file: "content/etraktor.json"
        fields:
          - label: "ET 2000"
            name: et2000
            widget: object
            fields:
              - { label: "Nadpis", name: nadpis, widget: string }
              - { label: "Popis", name: popis, widget: text }
              - { label: "Hlavný obrázok", name: image, widget: image }
              - label: "Galéria obrázkov"
                name: galeria
                widget: list
                fields:
                  - { label: "Obrázok", name: image, widget: image }
                  - { label: "Popis", name: popis, widget: string, required: false }
              - label: "Dokumenty na stiahnutie"
                name: dokumenty
                widget: list
                fields:
                  - { label: "Názov dokumentu", name: nazov, widget: string }
                  - { label: "Súbor (PDF)", name: subor, widget: file }
              - label: "Videá (YouTube)"
                name: videa
                widget: list
                fields:
                  - { label: "Popis videa", name: popis, widget: string }
                  - { label: "YouTube URL", name: url, widget: string }
          - label: "ET 3000"
            name: et3000
            widget: object
            fields:
              - { label: "Nadpis", name: nadpis, widget: string }
              - { label: "Popis", name: popis, widget: text }
              - { label: "Hlavný obrázok", name: image, widget: image }
              - label: "Galéria obrázkov"
                name: galeria
                widget: list
                fields:
                  - { label: "Obrázok", name: image, widget: image }
                  - { label: "Popis", name: popis, widget: string, required: false }
              - label: "Dokumenty na stiahnutie"
                name: dokumenty
                widget: list
                fields:
                  - { label: "Názov dokumentu", name: nazov, widget: string }
                  - { label: "Súbor (PDF)", name: subor, widget: file }
              - label: "Videá (YouTube)"
                name: videa
                widget: list
                fields:
                  - { label: "Popis videa", name: popis, widget: string }
                  - { label: "YouTube URL", name: url, widget: string }
          - label: "Príslušenstvo"
            name: prislusenstvo
            widget: list
            fields:
              - { label: "Názov", name: nazov, widget: string }
              - { label: "Popis", name: popis, widget: text }
              - { label: "Obrázok", name: image, widget: image }
              - label: "Dokumenty"
                name: dokumenty
                widget: list
                fields:
                  - { label: "Názov", name: nazov, widget: string }
                  - { label: "Súbor", name: subor, widget: file }
